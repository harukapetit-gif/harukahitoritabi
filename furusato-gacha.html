<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ふるさと納税ガチャ</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#D63030;--red-d:#B02020;--red-l:#E85050;
  --gold:#E8C040;--gold-d:#C8A020;
  --sky:#5BAEDD;--green:#4A9A50;
  --cream:#FFFDF5;--sand:#F6F0E8;
  --ink:#2A2218;--ink-l:#5A4A38;--terra:#B8705A;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--sand);color:var(--ink);overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* HERO */
.hero{position:relative;width:100%;}
.hero-img{width:100%;display:block;max-height:440px;object-fit:cover;object-position:center top;}

/* STATS */
.stats-strip{background:var(--ink);display:flex;justify-content:center;border-top:3px solid var(--red);}
.stat-cell{flex:1;text-align:center;padding:12px 6px;border-right:1px solid rgba(255,255,255,.08);max-width:120px}
.stat-cell:last-child{border-right:none}
.stat-num{display:block;font-family:'Montserrat',sans-serif;font-size:20px;font-weight:700;color:var(--gold);line-height:1;margin-bottom:4px}
.stat-lbl{font-size:8px;color:rgba(255,255,255,.45);letter-spacing:2px;text-transform:uppercase;font-family:'Montserrat',sans-serif}

/* MAIN */
.main{background:var(--sand)}
.content{max-width:480px;margin:0 auto;padding:0 20px 64px}

/* SEC HEAD */
.sec-head{text-align:center;margin:38px 0 20px}
.sec-head-ja{font-family:'Shippori Mincho B1',serif;font-size:16px;font-weight:700;color:var(--ink);letter-spacing:.12em}
.sec-head-ja em{color:var(--red);font-style:normal}
.sec-rule{width:36px;height:2px;background:var(--red);margin:10px auto 0;border-radius:1px}

/* SPIN BUTTON */
.spin-wrap{text-align:center;margin:20px 0 8px;}
.hero-spin{
  display:inline-flex;align-items:center;gap:10px;
  background:var(--red);color:#fff;border:none;border-radius:50px;
  padding:18px 56px;font-family:'Shippori Mincho B1',serif;
  font-size:20px;font-weight:700;letter-spacing:4px;cursor:pointer;
  box-shadow:0 5px 0 var(--red-d),0 8px 28px rgba(180,30,30,.40);
  transition:all .15s;white-space:nowrap;position:relative;overflow:hidden;
}
.hero-spin::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:rgba(255,255,255,.18);border-radius:50px 50px 0 0;}
.hero-spin:hover{background:var(--red-l);box-shadow:0 5px 0 var(--red-d),0 10px 36px rgba(180,30,30,.50);transform:translateY(-2px);}
.hero-spin:active:not(:disabled){transform:translateY(3px);box-shadow:0 2px 0 var(--red-d),0 4px 16px rgba(180,30,30,.30);}
.hero-spin:disabled{opacity:.5;cursor:not-allowed}
.hero-spin.go{animation:btnpulse .3s ease-in-out infinite alternate}
@keyframes btnpulse{from{transform:scale(.97)}to{transform:scale(1.02)}}
.spin-ico{font-size:22px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.3))}

/* LOADING */
.loading{display:none;text-align:center;padding:28px;color:var(--red);font-size:13px;letter-spacing:3px;font-family:'Shippori Mincho B1',serif;animation:fadewave .8s ease-in-out infinite alternate}
.loading.on{display:block}
@keyframes fadewave{from{opacity:.3}to{opacity:1}}

/* RESULT */
.res-label{display:none;text-align:center;padding:28px 0 8px;font-family:'Shippori Mincho B1',serif;font-size:11px;letter-spacing:7px;color:var(--terra);text-transform:uppercase}
.res-label.on{display:block}
.res-card{display:none;background:var(--cream);border:2px solid #E8DCCC;border-radius:12px;padding:28px 22px 24px;box-shadow:0 4px 32px rgba(70,50,30,.10);}
.res-card.on{display:block;animation:reveal .4s cubic-bezier(.25,.8,.25,1)}
@keyframes reveal{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.res-inner{display:grid;grid-template-columns:1fr 88px;gap:18px;align-items:start}
.pref-tag{display:inline-block;border:1.5px solid var(--terra);color:var(--terra);font-size:9px;font-weight:600;font-family:'Montserrat',sans-serif;padding:3px 12px;border-radius:20px;margin-bottom:10px;letter-spacing:2px;}
.city-name{font-family:'Shippori Mincho B1',serif;font-size:clamp(22px,5.5vw,30px);font-weight:700;color:var(--ink);line-height:1.2;margin-bottom:4px;letter-spacing:.06em;}
.city-region{font-size:11px;color:var(--ink-l);margin-bottom:14px;letter-spacing:.1em}
.city-desc{font-size:12px;color:var(--ink-l);line-height:2.0;margin-bottom:18px;border-left:3px solid var(--red);padding-left:12px;}
.rak-btn{display:inline-flex;align-items:center;gap:8px;background:var(--red);color:#fff;text-decoration:none;padding:11px 20px;border-radius:8px;font-size:10px;font-weight:700;font-family:'Montserrat',sans-serif;letter-spacing:2px;text-transform:uppercase;transition:all .2s;box-shadow:0 3px 0 var(--red-d);}
.rak-btn:hover{background:var(--red-l);transform:translateY(-1px)}
.rak-btn::after{content:'→';font-size:13px}
.again-btn{background:transparent;color:var(--ink-l);border:1.5px solid #D8CCBC;padding:9px 18px;border-radius:8px;font-size:10px;cursor:pointer;font-family:'Montserrat',sans-serif;transition:all .2s;margin-top:10px;letter-spacing:1.5px;text-transform:uppercase;display:block;}
.again-btn:hover{border-color:var(--red);color:var(--red)}
.emoji-circle{width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,#FFF0E8,#F0E0D0);border:2px solid #E8D8CC;display:flex;align-items:center;justify-content:center;font-size:40px;flex-shrink:0;box-shadow:0 3px 12px rgba(180,120,80,.15);}

/* RARITY */
.rarity-tag{display:inline-block;padding:3px 12px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:2px;margin-bottom:10px;font-family:'Montserrat',sans-serif;text-transform:uppercase;}
.rN{background:#F0EBE3;color:#8A7A68;border:1.5px solid #D8CCBC}
.rR{background:#E8F4EC;color:#3A8A50;border:1.5px solid #90C8A0}
.rSR{background:#EEE8F8;color:#7050B0;border:1.5px solid #C0A8E0}
.rSSR{background:#FFF5E0;color:#B07010;border:1.5px solid var(--gold)}

/* FEATURES */
.feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:30px}
.feat{background:var(--cream);border:1.5px solid #E8DCCC;border-radius:10px;padding:20px 10px;text-align:center;transition:all .2s;text-decoration:none;color:inherit;display:block;}
.feat:hover{border-color:var(--red);transform:translateY(-2px);box-shadow:0 4px 18px rgba(180,50,30,.10)}
.feat-ico{font-size:26px;margin-bottom:9px;display:block}
.feat-en{font-size:8px;letter-spacing:3px;color:var(--red);font-family:'Montserrat',sans-serif;text-transform:uppercase;margin-bottom:5px;display:block}
.feat-ja{font-size:10px;color:var(--ink-l);line-height:1.75}

/* EFFECTS */
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:200}
.cp{position:absolute;animation:cpfall linear forwards;border-radius:50%}
@keyframes cpfall{0%{transform:translateY(-10px) rotate(0);opacity:.8}100%{transform:translateY(100vh) rotate(360deg);opacity:0}}
.flash{position:fixed;inset:0;pointer-events:none;z-index:100;background:radial-gradient(ellipse at center,rgba(255,220,120,.5),transparent 70%);opacity:0;transition:opacity .3s}
.flash.on{opacity:1}

/* FOOTER */
footer{text-align:center;padding:24px 20px;font-size:9px;color:var(--ink-l);opacity:.5;letter-spacing:1.5px;font-family:'Montserrat',sans-serif;line-height:2.8;border-top:1px solid #E8DCCC;}
</style>
</head>

let cntT=0,prefSet=new Set(),citySet=new Set(),cntS=0;

function pick(){
  // 全レアリティ均等25%ずつ（小さな自治体にも同じ確率でスポットを当てる）
  const rars=['N','R','SR','SSR'];
  const rar=rars[Math.floor(Math.random()*4)];
  const sub=MUNICIPALITIES.filter(m=>m.rarity===rar);
  const src=sub.length?sub:MUNICIPALITIES;
  // 都道府県でまず均等抽選 → 特定地域への偏りをなくす
  const prefs=[...new Set(src.map(m=>m.pref))];
  const pref=prefs[Math.floor(Math.random()*prefs.length)];
  const inPref=src.filter(m=>m.pref===pref);
  return inPref[Math.floor(Math.random()*inPref.length)];
}

function doSpin(){
  const btn=document.getElementById('spin-btn');
  const loading=document.getElementById('loading');
  const hdr=document.getElementById('res-hdr');
  const card=document.getElementById('res-card');
  if(btn.disabled) return;
  btn.disabled=true;btn.classList.add('go');
  hdr.classList.remove('on');card.classList.remove('on');
  loading.classList.add('on');
  setTimeout(()=>{
    const m=pick();
    showResult(m);updateStats(m);
    loading.classList.remove('on');
    btn.disabled=false;btn.classList.remove('go');
    if(m.rarity==='SSR'){
      document.getElementById('flash').classList.add('on');
      setTimeout(()=>document.getElementById('flash').classList.remove('on'),600);
    }
    launchConf(m.rarity==='SSR'||m.rarity==='SR');
    hdr.classList.add('on');
  },1200);
}

function showResult(m){
  const rarMap={N:'Normal — 政令・中核市',R:'Rare — 一般市',SR:'Super Rare — 町',SSR:'⭐ Super Special Rare — 村'};
  const rarClass={N:'rN',R:'rR',SR:'rSR',SSR:'rSSR'};
  document.getElementById('r-rar').textContent=rarMap[m.rarity];
  document.getElementById('r-rar').className='rarity-tag '+rarClass[m.rarity];
  document.getElementById('r-pref').textContent=m.pref;
  document.getElementById('r-city').textContent=m.city;
  document.getElementById('r-region').textContent=m.region;
  document.getElementById('r-desc').textContent=m.desc;
  document.getElementById('r-emoji').textContent=m.emoji;
  document.getElementById('r-link').href=m.shop||'https://event.rakuten.co.jp/furusato/area/';
  const card=document.getElementById('res-card');
  card.style.animation='none';card.offsetHeight;card.style.animation='';
  card.classList.add('on');
  const borderC=m.rarity==='SSR'?'var(--gold)':m.rarity==='SR'?'#C0A8E0':'#E8DCCC';
  card.style.borderColor=borderC;
}

function updateStats(m){
  cntT++;prefSet.add(m.pref);citySet.add(m.city);
  if(m.rarity==='SSR')cntS++;
  document.getElementById('cnt-t').textContent=cntT;
  document.getElementById('cnt-p').textContent=prefSet.size;
  document.getElementById('cnt-c').textContent=citySet.size;
  document.getElementById('cnt-s').textContent=cntS;
}

function launchConf(big){
  const wrap=document.getElementById('conf');
  wrap.innerHTML='';
  const colors=big
    ?['#D63030','#E8C040','#4A9A50','#5BAEDD','#C060A0','#E87030','#fff']
    :['#D63030','#E8C040','#4A9A50','#5BAEDD'];
  for(let i=0;i<(big?80:25);i++){
    const p=document.createElement('div');
    p.className='cp';
    p.style.cssText=`left:${Math.random()*100}%;top:-8px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${5+Math.random()*8}px;height:${5+Math.random()*8}px;animation-duration:${1.6+Math.random()*2.2}s;animation-delay:${Math.random()*.5}s;`;
    wrap.appendChild(p);
  }
  setTimeout(()=>{wrap.innerHTML=''},3500);
}
